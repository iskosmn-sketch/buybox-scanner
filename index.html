<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyBox Scanner</title>

  <!-- Barkod okuma kütüphanesi -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  APPS SCRIPT TARAFI — Code.gs dosyana şu fonksiyonu ekle:      ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║                                                                 ║
  ║  function doPost(e) {                                           ║
  ║    var data = JSON.parse(e.postData.contents);                  ║
  ║    var barcode = data.barcode;                                  ║
  ║    var result = checkBuyBoxFromWeb(barcode);                    ║
  ║    return ContentService                                        ║
  ║      .createTextOutput(JSON.stringify(result))                  ║
  ║      .setMimeType(ContentService.MimeType.JSON);                ║
  ║  }                                                              ║
  ║                                                                 ║
  ║  Sonra:                                                         ║
  ║  1. Deploy > New Deployment > Web App                           ║
  ║  2. "Who has access" → "Anyone"                                 ║
  ║  3. Deploy et ve URL'yi aşağıdaki APPS_SCRIPT_URL'ye yapıştır   ║
  ╚══════════════════════════════════════════════════════════════════╝
  -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    /* Üst başlık */
    .header {
      text-align: center;
      padding: 24px 0 20px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header p {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 6px;
    }

    /* Kartlar */
    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    /* Kamera alanı */
    #reader {
      width: 100%;
      min-height: 260px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.6);
      border: 2px dashed rgba(96, 165, 250, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      text-align: center;
      padding: 16px;
      transition: border-color 0.3s ease;
    }

    #reader:hover {
      border-color: rgba(96, 165, 250, 0.5);
    }

    /* html5-qrcode oluşturduğu video'yu düzelt */
    #reader video {
      border-radius: 12px !important;
    }

    .camera-placeholder {
      font-size: 14px;
      line-height: 1.7;
    }

    .camera-placeholder .icon {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }

    /* Input */
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 14px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      margin-bottom: 12px;
    }

    input[type="text"]::placeholder {
      color: #64748b;
    }

    input[type="text"]:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
    }

    /* Butonlar */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }

    .btn-camera {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      box-shadow: 0 4px 14px rgba(5, 150, 105, 0.35);
    }

    .btn-camera:hover {
      box-shadow: 0 6px 20px rgba(5, 150, 105, 0.5);
    }

    .btn-reset {
      background: rgba(51, 65, 85, 0.6);
      color: #cbd5e1;
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .btn-reset:hover {
      background: rgba(71, 85, 105, 0.6);
    }

    /* Mesajlar */
    .message {
      display: none;
      padding: 12px 16px;
      border-radius: 14px;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
      animation: slideIn 0.3s ease;
    }

    .message.show {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading {
      background: rgba(37, 99, 235, 0.15);
      color: #93c5fd;
      font-weight: 600;
    }

    .loading .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(147, 197, 253, 0.3);
      border-top-color: #93c5fd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
    }

    .info {
      background: rgba(96, 165, 250, 0.12);
      color: #93c5fd;
    }

    /* Sonuç kartı */
    .result {
      display: none;
      margin-top: 16px;
      animation: slideIn 0.4s ease;
    }

    .result.show {
      display: block;
    }

    .result-header {
      text-align: center;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      margin-bottom: 12px;
    }

    .result-emoji {
      font-size: 44px;
      margin-bottom: 6px;
    }

    .result-title {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(148, 163, 184, 0.06);
    }

    .result-row:last-child {
      border-bottom: 0;
    }

    .result-label {
      color: #64748b;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .result-value {
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 500;
      text-align: right;
      word-break: break-word;
      max-width: 60%;
    }

    /* URL ayar kutusu */
    .url-config {
      margin-bottom: 16px;
    }

    .url-config label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .url-config input {
      font-size: 13px;
      margin-bottom: 0;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Başlık -->
    <div class="header">
      <h1>📦 BuyBox Scanner</h1>
      <p>Kamera ile barkod okut veya manuel giriş yap</p>
    </div>

    <!-- Kamera alanı -->
    <div class="card">
      <div id="reader">
        <div class="camera-placeholder">
          <span class="icon">📷</span>
          Kamera henüz başlatılmadı.<br>
          Aşağıdan <b>Kamerayı Aç</b> butonuna bas.
        </div>
      </div>
    </div>


    <!-- Giriş ve butonlar -->
    <div class="card">
      <input type="text" id="barcodeInput" placeholder="Barkodu manuel gir...">

      <div class="btn-group">
        <button class="btn-primary" onclick="checkManualBarcode()">🔍 Sorgula</button>
        <button class="btn-camera" onclick="startScanner()">📷 Kamerayı Aç</button>
        <button class="btn-reset" onclick="resetScanner()">🔄 Temizle / Yeniden Başlat</button>
      </div>

      <!-- Mesajlar -->
      <div id="loading" class="message loading">
        <div class="spinner"></div>
        <span>Sorgulanıyor...</span>
      </div>
      <div id="info" class="message info"></div>
      <div id="error" class="message error"></div>

      <!-- Sonuç -->
      <div id="result" class="result card">
        <div class="result-header">
          <div class="result-emoji" id="resultEmoji"></div>
          <div class="result-title" id="resultTitle"></div>
        </div>

        <div class="result-row">
          <div class="result-label">Barkod</div>
          <div class="result-value" id="rBarcode"></div>
        </div>
        <div class="result-row">
          <div class="result-label">Sıralama</div>
          <div class="result-value" id="rOrder"></div>
        </div>
        <div class="result-row">
          <div class="result-label">BuyBox Fiyat</div>
          <div class="result-value" id="rPrice"></div>
        </div>
        <div class="result-row">
          <div class="result-label">Çoklu Satıcı</div>
          <div class="result-value" id="rSeller"></div>
        </div>
        <div class="result-row">
          <div class="result-label">Durum</div>
          <div class="result-value" id="rStatus"></div>
        </div>
        <div class="result-row">
          <div class="result-label">Öneri</div>
          <div class="result-value" id="rAdvice"></div>
        </div>
        <div class="result-row">
          <div class="result-label">Tarih</div>
          <div class="result-value" id="rDate"></div>
        </div>
        <div class="result-row">
          <div class="result-label">Saat</div>
          <div class="result-value" id="rTime"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== GLOBAL DEĞİŞKENLER =====
    let html5QrCode = null;
    let lastScannedCode = '';
    let scannerRunning = false;

    // ===== BİP SESİ (Web Audio API) =====
    function playBeep() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(1800, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);

        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.15);
      } catch (e) {
        console.warn('Bip sesi çalınamadı:', e);
      }
    }

    // ===== MESAJ FONKSİYONLARI =====
    function showInfo(message) {
      const el = document.getElementById('info');
      el.textContent = '💡 ' + message;
      el.classList.add('show');
    }

    function hideInfo() {
      const el = document.getElementById('info');
      el.classList.remove('show');
      el.textContent = '';
    }

    function showError(message) {
      const el = document.getElementById('error');
      el.textContent = '⚠️ ' + message;
      el.classList.add('show');
    }

    function hideError() {
      const el = document.getElementById('error');
      el.classList.remove('show');
      el.textContent = '';
    }

    function showLoading(show) {
      const el = document.getElementById('loading');
      if (show) el.classList.add('show');
      else el.classList.remove('show');
    }

    function hideResult() {
      document.getElementById('result').classList.remove('show');
    }

    function showResult(data) {
      document.getElementById('resultEmoji').textContent = data.emoji || '';
      document.getElementById('resultTitle').textContent = data.status || '';
      document.getElementById('rBarcode').textContent = data.barcode || '';
      document.getElementById('rOrder').textContent = data.buyboxOrder ?? '';
      document.getElementById('rPrice').textContent = data.buyboxPrice ?? '';
      document.getElementById('rSeller').textContent = data.hasMultipleSeller ? 'EVET' : 'HAYIR';
      document.getElementById('rStatus').textContent = data.status || '';
      document.getElementById('rAdvice').textContent = data.oneri || '';
      document.getElementById('rDate').textContent = data.tarih || '';
      document.getElementById('rTime').textContent = data.saat || '';
      document.getElementById('result').classList.add('show');
    }

    // ===== KAMERA FONKSİYONLARI =====
    async function stopScanner() {
      try {
        if (html5QrCode && scannerRunning) {
          await html5QrCode.stop();
          await html5QrCode.clear();
        }
      } catch (err) {
        console.warn('Kamera durdurma uyarısı:', err);
      } finally {
        scannerRunning = false;
        html5QrCode = null;
      }
    }

    async function startScanner() {
      hideError();
      hideInfo();

      if (scannerRunning) {
        showInfo('Kamera zaten açık.');
        return;
      }

      try {
        // Kamera izni iste
        const cameras = await Html5Qrcode.getCameras();

        if (!cameras || cameras.length === 0) {
          throw new Error('Hiç kamera bulunamadı. Cihazında kamera var mı?');
        }

        // Arka kamerayı tercih et
        let selectedCameraId = cameras[0].id;
        const backCamera = cameras.find(device => {
          const label = (device.label || '').toLowerCase();
          return label.includes('back') ||
            label.includes('rear') ||
            label.includes('environment') ||
            label.includes('arka');
        });

        if (backCamera) {
          selectedCameraId = backCamera.id;
        }

        html5QrCode = new Html5Qrcode("reader", {
          formatsToSupport: [
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39
          ]
        });

        await html5QrCode.start(
          selectedCameraId,
          {
            fps: 15,
            qrbox: { width: 280, height: 120 },
            aspectRatio: 1.0,
            rememberLastUsedCamera: true,
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
          },
          onScanSuccess,
          onScanFailure
        );

        // Kamera zoom ve autofocus ayarla
        try {
          const videoTrack = html5QrCode.getRunningTrackSettings && html5QrCode.getRunningTrackCameraCapabilities
            ? null : null;
          const videoEl = document.querySelector('#reader video');
          if (videoEl && videoEl.srcObject) {
            const track = videoEl.srcObject.getVideoTracks()[0];
            const capabilities = track.getCapabilities ? track.getCapabilities() : {};
            const constraints = {};

            if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
              constraints.focusMode = 'continuous';
            }
            if (capabilities.zoom) {
              // Hafif zoom: daha iyi barkod okuma
              const midZoom = Math.min(capabilities.zoom.max, capabilities.zoom.min + (capabilities.zoom.max - capabilities.zoom.min) * 0.3);
              constraints.zoom = midZoom;
            }

            if (Object.keys(constraints).length > 0) {
              await track.applyConstraints({ advanced: [constraints] });
            }
          }
        } catch (zoomErr) {
          console.warn('Zoom/focus ayarlanamadı (normal):', zoomErr);
        }

        scannerRunning = true;
        showInfo('Kamera açıldı! Barkodu kameraya göster.');
      } catch (err) {
        console.error('Kamera hatası:', err);
        scannerRunning = false;

        if (err.name === 'NotAllowedError') {
          showError('Kamera izni reddedildi. Tarayıcı ayarlarından izin ver.');
        } else if (err.name === 'NotFoundError') {
          showError('Kamera bulunamadı. Cihazında kamera olduğundan emin ol.');
        } else {
          showError('Kamera açılamadı: ' + (err.message || err));
        }
      }
    }

    async function onScanSuccess(decodedText) {
      if (decodedText === lastScannedCode) return;

      // Bip sesi çal
      playBeep();

      lastScannedCode = decodedText;
      document.getElementById('barcodeInput').value = decodedText;

      await stopScanner();
      checkBuyBox(decodedText);
    }

    function onScanFailure(error) {
      // Sessiz — sürekli tarama denemeleri hata verir, normaldir.
    }

    // ===== SORGULAMA FONKSİYONLARI =====
    function checkManualBarcode() {
      const barcode = document.getElementById('barcodeInput').value.trim();
      if (!barcode) {
        showError('Lütfen bir barkod gir.');
        return;
      }
      checkBuyBox(barcode);
    }

    async function checkBuyBox(barcode) {
      hideError();
      hideInfo();
      hideResult();
      showLoading(true);

      const url = 'https://script.google.com/macros/s/AKfycbxe9YBFc8O9YCRsrGhbycYJSoVsG9lBrTa9xWCKVTW7j_1Rcz13179COVMP6MKJ5xXF/exec';

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({ barcode: barcode }),
          redirect: 'follow'
        });

        const data = await response.json();
        showLoading(false);

        if (!data || !data.success) {
          showError((data && data.error) ? data.error : 'Sorgu başarısız.');
          return;
        }

        showResult(data);
      } catch (err) {
        showLoading(false);
        console.error('Fetch hatası:', err);
        showError('Sunucuya bağlanılamadı: ' + err.message);
      }
    }

    // ===== SIFIRLAMA =====
    async function resetScanner() {
      await stopScanner();
      lastScannedCode = '';
      document.getElementById('barcodeInput').value = '';
      hideError();
      hideInfo();
      hideResult();
      showLoading(false);

      document.getElementById('reader').innerHTML = `
        <div class="camera-placeholder">
          <span class="icon">📷</span>
          Kamera henüz başlatılmadı.<br>
          Aşağıdan <b>Kamerayı Aç</b> butonuna bas.
        </div>
      `;

      showInfo('Temizlendi. Kamerayı Aç butonuna basabilirsin.');
    }

    // ===== SAYFA HAZIR =====
    document.addEventListener('DOMContentLoaded', function () {
      // Enter ile sorgula
      document.getElementById('barcodeInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          checkManualBarcode();
        }
      });

      showInfo('Hazır! Kamera için "Kamerayı Aç" butonuna bas veya barkodu manuel gir.');
    });
  </script>
</body>

</html>
