<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Depo Stok Yönetimi (WMS)</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Üst Menü / Mod Seçimi */
        .header-bar {
            background: #1e293b;
            padding: 12px 10px;
            display: flex;
            gap: 8px;
            justify-content: space-between;
            border-bottom: 2px solid #334155;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 5px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
            opacity: 0.5;
        }

        .mode-btn.active {
            opacity: 1;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-in {
            background: #10b981;
        }

        .btn-out {
            background: #ef4444;
        }

        .btn-view {
            background: #3b82f6;
            flex: 0.7;
            font-size: 12px;
        }

        /* Kamera Alanı */
        .camera-container {
            padding: 15px;
            background: #0f172a;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            min-height: 250px;
            border: 3px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #reader video {
            border-radius: 12px !important;
        }

        /* Durum ve Yönlendirme Paneli */
        .status-panel {
            margin-top: 15px;
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .status-panel.focus-product {
            border-color: #f59e0b;
        }

        .status-panel.focus-location {
            border-color: #8b5cf6;
        }

        .instruction {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 5px;
            color: #cbd5e1;
        }

        .instruction.highlight {
            color: #facc15;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        .sub-instruction {
            font-size: 13px;
            color: #94a3b8;
        }

        /* Manuel Giriş Alanı */
        .manual-entry {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .manual-entry input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .manual-entry input:focus {
            border-color: #3b82f6;
        }

        .manual-entry button {
            padding: 0 20px;
            border-radius: 10px;
            border: none;
            background: #334155;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* Geçici Ekran Bildirimleri */
        .toast {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            z-index: 100;
            white-space: nowrap;
        }

        /* Sonuç (Stok Gör) Alanı */
        .view-result {
            display: none;
            margin-top: 15px;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-align: left;
        }

        .view-result h3 {
            color: #60a5fa;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .loc-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #334155;
            padding: 8px 0;
            font-size: 14px;
        }

        .loc-row:last-child {
            border: none;
        }
    </style>
</head>

<body>

    <!-- MOD SEÇİMLERİ -->
    <div class="header-bar">
        <button class="mode-btn btn-in" id="btnModeIn" onclick="setMode('IN')">🟢 Giriş (+)</button>
        <button class="mode-btn btn-out" id="btnModeOut" onclick="setMode('OUT')">🔴 Çıkış (-)</button>
        <button class="mode-btn btn-view" id="btnModeView" onclick="setMode('VIEW')">👁️ Stok Gör</button>
    </div>

    <div class="camera-container">
        <!-- KAMERA -->
        <div id="reader">
            <div style="padding:40px; color:#64748b; text-align:center;">
                Depo sistemine hoşgeldiniz.<br><br>Başlamak için yukarıdan bir Moda tıklayın.
            </div>
        </div>

        <!-- BİLGİ PANELİ -->
        <div class="status-panel focus-product" id="statusPanel" style="display: none;">
            <div class="instruction highlight" id="lblInstruction">Lütfen Mod Seçin</div>
            <div class="sub-instruction" id="lblSubInstruction">Kamera açıldığında işleme başlayabilirsiniz.</div>

            <!-- MANUEL GİRİŞ -->
            <div class="manual-entry">
                <input type="text" id="manualInput" placeholder="Manuel giriş yapın...">
                <button onclick="handleManualInput()">OK</button>
            </div>
        </div>

        <!-- STOK GÖR SONUÇLARI -->
        <div class="view-result" id="viewResult"></div>
    </div>

    <div class="toast" id="toastMessage">✔️ İşlem Başarılı</div>

    <script>
        // ===== GOOGLE APPS SCRIPT URL =====
        // BuyBox taramasında kullandığın AYNI Web App URL'sini buraya yapıştır!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxe9YBFc8O9YCRsrGhbycYJSoVsG9lBrTa9xWCKVTW7j_1Rcz13179COVMP6MKJ5xXF/exec";

        // ===== DEĞİŞKENLER =====
        let html5QrCode = null;
        let currentMode = null;
        let currentState = 'IDLE';
        let scannedProduct = "";
        let lastScannedText = "";
        let lastScanTime = 0;

        // ===== SES SİSTEMİ =====
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBeep(type) {
            if (!audioCtx) initAudio();
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'success') {
                    osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'scan') {
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.08);
                } else if (type === 'error') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.3);
                }

                gain.gain.setValueAtTime(1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(audioCtx.currentTime);
            } catch (e) { }
        }

        // ===== KAMERA BAŞLATMA =====
        async function startCamera() {
            initAudio();
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader", {
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.UPC_A,
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.QR_CODE
                    ]
                });
            }

            if (html5QrCode.isScanning) return; // Zaten çalışıyorsa geç

            document.getElementById('reader').innerHTML = ""; // Temizle

            try {
                const cameras = await Html5Qrcode.getCameras();
                let camId = cameras.length > 0 ? cameras[0].id : null;

                // Arka kamerayı bul
                const backCam = cameras.find(c => (c.label || '').toLowerCase().includes('back') || (c.label || '').toLowerCase().includes('environment'));
                if (backCam) camId = backCam.id;

                if (camId) {
                    await html5QrCode.start(camId, {
                        fps: 15,
                        qrbox: { width: 250, height: 250 }, // Hem kare QR hem de düz barkod için ideal
                        aspectRatio: 1.0,
                        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
                    }, onScanSuccess, (err) => { });

                    document.getElementById('statusPanel').style.display = 'block';
                }
            } catch (e) {
                alert("Kamera açılamadı: " + e.message);
            }
        }

        // ===== MANTIK YÖNETİMİ =====
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btnModeIn').classList.remove('active');
            document.getElementById('btnModeOut').classList.remove('active');
            document.getElementById('btnModeView').classList.remove('active');

            if (mode === 'IN') document.getElementById('btnModeIn').classList.add('active');
            if (mode === 'OUT') document.getElementById('btnModeOut').classList.add('active');
            if (mode === 'VIEW') document.getElementById('btnModeView').classList.add('active');

            document.getElementById('viewResult').style.display = 'none';
            startCamera();
            resetState();
        }

        function resetState() {
            scannedProduct = "";
            currentState = 'WAITING_PRODUCT';
            document.getElementById('manualInput').value = '';

            let panel = document.getElementById('statusPanel');
            panel.className = 'status-panel focus-product';
            document.getElementById('lblInstruction').className = 'instruction highlight';

            if (currentMode === 'VIEW') {
                document.getElementById('lblInstruction').innerText = "👁️ ÜRÜN BARKODUNU OKUTUN";
                document.getElementById('lblSubInstruction').innerText = "Bu ürünün hangi raflarda olduğunu bulacağız.";
            } else {
                let prefix = currentMode === 'IN' ? '🟢 GİRİŞ (+1)' : '🔴 ÇIKIŞ (-1)';
                document.getElementById('lblInstruction').innerText = prefix + " -> ÜRÜN BARKODU BEKLENİYOR";
                document.getElementById('lblSubInstruction').innerText = "Lütfen işleme girecek (1. Adım) ÜRÜNÜ okutun.";
            }
        }

        function onScanSuccess(decodedText) {
            // Çift okumayı (bounce) engelle
            const now = new Date().getTime();
            if (decodedText === lastScannedText && (now - lastScanTime) < 1500) return;

            lastScannedText = decodedText;
            lastScanTime = now;
            handleInput(decodedText);
        }

        function handleManualInput() {
            const val = document.getElementById('manualInput').value.trim();
            if (val) handleInput(val);
        }

        // Karar Mekanizması: 1. Adım Ürün / 2. Adım Kutu
        function handleInput(text) {
            if (currentState === 'WAITING_PRODUCT') {
                playBeep('scan');
                scannedProduct = text; // Ürünü hafızaya aldık

                if (currentMode === 'VIEW') {
                    sendToBackend({ action: "stok_gor", barcode: scannedProduct });
                } else {
                    // İkinci Aşamaya Geç (Kutu/Konum okuma)
                    currentState = 'WAITING_LOCATION';
                    document.getElementById('manualInput').value = '';

                    let panel = document.getElementById('statusPanel');
                    panel.className = 'status-panel focus-location';
                    document.getElementById('lblInstruction').innerText = "📦 ŞİMDİ KUTU / RAF OKUTUN";
                    document.getElementById('lblSubInstruction').innerText = `Ürün (${scannedProduct}) havada bekliyor... Konum QR kodunu okutun.`;
                }
            }
            else if (currentState === 'WAITING_LOCATION') {
                playBeep('scan');
                const locationStr = text; // İkinci adımda okunan raf bilgisi

                const actionStr = currentMode === 'IN' ? 'stok_giris' : 'stok_cikis';

                // Sonucu Ekrana Bas (Ekranda bekleme olmasın diye hemen sıfırla, çalışmaya devam et)
                showToast(currentMode === 'IN' ? `GİRİŞ: Ürün -> ${locationStr} konumuna eklendi.` : `ÇIKIŞ: Ürün -> ${locationStr} konumundan alındı.`);

                // Arka planda sunucuya yolla
                sendToBackend({ action: actionStr, barcode: scannedProduct, location: locationStr });

                // Yeni bir koliye / ürüne geçmek için saniyesinde başa dön!
                resetState();
            }
        }

        // ===== SUNUCU YÖNETİMİ =====
        function sendToBackend(payload) {
            // Bu kısım arka planda sessiz çalışır, "Stok Gör" hariç ekranı kilitlemez.
            if (payload.action === 'stok_gor') {
                document.getElementById('lblSubInstruction').innerText = "⏳ Veritabanı taranıyor...";
            }

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
                .then(res => res.json())
                .then(data => {
                    if (payload.action === 'stok_gor') {
                        playBeep('success');
                        showViewResult(payload.barcode, data);
                        // 3 saniye sonra otomatik başa dön
                        setTimeout(resetState, 5000);
                    } else {
                        // GİRİŞ / ÇIKIŞ başarılı olduğunda arka planda tatlı bir bip çalar.
                        if (data.success) {
                            playBeep('success');
                        } else {
                            playBeep('error');
                            alert("Veritabanı Hatası: " + data.error);
                        }
                    }
                })
                .catch(err => {
                    playBeep('error');
                    if (payload.action === 'stok_gor') {
                        document.getElementById('lblSubInstruction').innerText = "❌ Hata: İnternet veya sunucu bağlanamadı.";
                    }
                });
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMessage');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function showViewResult(barcode, data) {
            const vr = document.getElementById('viewResult');
            vr.style.display = 'block';
            vr.innerHTML = `<h3>${barcode} İçin Depo Konumları:</h3>`;

            if (!data.success || !data.locations || data.locations.length === 0) {
                vr.innerHTML += `<div class="loc-row"><span style="color:#ef4444;">Boş / Bu üründen depoda kalmamış.</span></div>`;
                return;
            }

            // Gelen Konum Verisini Ekrana Bas
            data.locations.forEach(loc => {
                vr.innerHTML += `
           <div class="loc-row">
             <span>📍 ${loc.name}</span>
             <strong style="color:#10b981;">${loc.qty} Adet</strong>
           </div>
         `;
            });
        }

        // Sayfa açıldığında Enter tuşu dinleyicisi ekle
        document.getElementById('manualInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleManualInput();
        });

    </script>
</body>

</html>
